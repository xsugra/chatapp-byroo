name: Publish

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-server:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Publish Server
      run: dotnet publish src/ChatApp.Server/ChatApp.Server.csproj -c Release -o ./publish/server --no-restore
    
    - name: Upload Server Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: server-build
        path: ./publish/server/
        retention-days: 30

  publish-client:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Publish Client (Win x64)
      run: dotnet publish src/ChatApp.Client/ChatApp.Client.csproj -c Release -o ./publish/client-win-x64 -f net10.0-windows --self-contained false --runtime win-x64
    
    - name: Upload Client Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: client-build-windows
        path: ./publish/client-win-x64/
        retention-days: 30

  create-release:
    needs: [publish-server, publish-client]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Server Build
      uses: actions/download-artifact@v4
      with:
        name: server-build
        path: ./artifacts/server
    
    - name: Download Client Build
      uses: actions/download-artifact@v4
      with:
        name: client-build-windows
        path: ./artifacts/client
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./artifacts/server/**/*
          ./artifacts/client/**/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

