version: 2
updates:
  # Enable version updates for NuGet packages
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "samuelsugra"
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "chore(deps): "
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    # Group related dependencies
    groups:
      test-dependencies:
        dependency-type: "test"
      dev-dependencies:
        dependency-type: "development"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    reviewers:
      - "samuelsugra"
    labels:
      - "ci"
      - "github-actions"
    commit-message:
      prefix: "ci(actions): "

